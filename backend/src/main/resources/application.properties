spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/codinvest
spring.datasource.username=codinvest
spring.datasource.password=codinvest

# Cria/atualiza as tabelas automaticamente a partir das entidades — bom pra
# desenvolvimento; trocar para "validate" (com Flyway/Liquibase cuidando das
# migrations) quando o schema estabilizar e for pra produção.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
